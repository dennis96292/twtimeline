name: Daily Taiwan History Agent

on:
  schedule:
    # 14:00 UTC = 22:00 Taiwan time (UTC+8), every 3 days
    - cron: '0 14 */3 * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date (YYYY-MM-DD), leave blank for today'
        required: false
        default: ''

jobs:
  news-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: agents/requirements.txt

      - name: Install dependencies
        run: pip install -r agents/requirements.txt

      - name: Run web search agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: python agents/news_agent.py

      - name: Update README stats
        run: |
          python3 - <<'EOF'
          import json, re
          from pathlib import Path

          data = json.loads(Path("data/events.json").read_text(encoding="utf-8"))
          count = len(data)
          year_start = min(e["date"][:4] for e in data)
          year_end   = max(e["date"][:4] for e in data)

          readme = Path("README.md").read_text(encoding="utf-8")
          readme = re.sub(r'(badge/events-)\d+(-FF6B00)', rf'\g<1>{count}\2', readme)
          readme = re.sub(r'(badge/)\d+(%E2%80%93)\d+(-timeline)', rf'\g<1>{year_start}\2{year_end}\3', readme)
          Path("README.md").write_text(readme, encoding="utf-8")
          print(f"README updated: {count} events, {year_start}–{year_end}")
          EOF

      - name: Check if new events were found
        id: check
        run: |
          if [ -f agents/.no_new_events ]; then
            echo "has_events=false" >> "$GITHUB_OUTPUT"
            cat agents/.no_new_events
          else
            echo "has_events=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push to main
        if: steps.check.outputs.has_events == 'true'
        env:
          TARGET_DATE: ${{ github.event.inputs.target_date || 'today' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/events.json README.md
          git commit -m "feat: add Taiwan events for ${TARGET_DATE}" -m "$(cat agents/.pr_body.md)"
          # Retry on race condition: rebase onto latest origin/main and push again
          for attempt in 1 2 3; do
            git pull --rebase origin main || exit 1
            if git push origin HEAD:main; then
              echo "Pushed on attempt ${attempt}"
              exit 0
            fi
            echo "Push attempt ${attempt} failed; retrying after rebase..."
            sleep 5
          done
          echo "Push failed after 3 attempts" >&2
          exit 1

      - name: Cleanup temp files
        if: always()
        run: |
          rm -f agents/.no_new_events agents/.pr_body.md
