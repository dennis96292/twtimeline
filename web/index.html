<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台灣發生了什麼?</title>
  <link rel="stylesheet" href="/css/index.css" />
</head>
<body>

<header>
  <h1>台灣發生了什麼?</h1>
  <p>Taiwan Historical Events Timeline</p>
</header>

<div id="search-wrap">
  <div class="search">
    <div class="search-box">
      <div class="search-field">
        <input id="search-input" placeholder="搜尋事件…" class="input" type="text" autocomplete="off" />
        <div class="search-box-icon">
          <button class="btn-icon-content" onclick="doSearch()">
            <i class="search-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z" fill="#FF8C33"/></svg>
            </i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="search-badge" style="display:none"></div>

<div class="tl-wrap">
  <div class="tl-spine"></div>
  <div id="events-container"></div>
  <div id="loader-area">
    <div class="loader-inner" id="loader">
      <div class="spin-ring"></div>
      <div class="load-txt">載入歷史事件中…</div>
    </div>
  </div>
</div>

<script src="/js/index.js"></script>
</body>
</html>
